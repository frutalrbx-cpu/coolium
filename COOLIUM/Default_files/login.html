<html>
<head>
    <title>Coolium Login</title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8"/>
    <link rel="canonical" href="./e.html"/>
    <style type="text/css">
        @font-face {
            font-family: Iconochive-Regular;
            src: url('9de0d92fa000ea323be23a2ead47fdc09e3f36b1') format(embedded-opentype), 
                 url('bf06cf6e7d96d7808b0c245be28d79c6b963a5e0') format(woff), 
                 url('8f9cf41bd5f2ceaca7cfda5e501759f3f6d52698') format(truetype), 
                 url('cd771b61da380ed06c23e07106c65bc2d778d7f1.svg') format(svg);
            font-weight: normal;
            font-style: normal;

    </style>

<body style="margin:0;background-color:white;width:1024px">
<div class="html1" style="width: 1024px;text-align: left;overflow-x: auto;overflow-y: auto; background-color: rgba(0, 0, 0, 0);position: relative;min-height: 768px; z-index: 0">
<div class="html" style="text-align:left;font-family:Verdana, Arial, Helvetica, sans-serif;font-size:x-small;overflow-x:visible;overflow-y:visible;">

<div class="body" style="vertical-align:bottom;min-height:758px;color:rgb(0, 0, 0);text-align:left;font-family:Verdana, Arial, Helvetica, sans-serif;font-size:x-small;padding-top:0px;overflow-x:visible;overflow-y:visible;margin: 0px 8px 8px;">
    
    <!-- 2005 Retro-Style Login Module Box Layout -->
    <div style="width: 300px; margin: 40px auto; padding: 20px; border: 1px solid #999; background-color: #f4f4f4; font-family: Verdana, Arial, sans-serif;">
        <h2 style="font-size: small; margin-top: 0; color: #333; border-bottom: 1px dashed #ccc; padding-bottom: 5px;">Roblox Login</h2>
        <p style="font-size: x-small; margin-bottom: 15px;">If you have an account:</p>
        
        <!-- FIX: Added valid action and method routing to prevent 403 blocks -->
        <form action="/login" method="POST">
            <div style="margin-bottom: 8px;">
                <label style="display: block; font-size: x-small; margin-bottom: 2px;">Username or E-mail:</label>
                <input type="text" name="username" style="width: 100%; font-size: x-small; border: 1px solid #7F9DB9; padding: 2px;">
            </div>
            
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: x-small; margin-bottom: 2px;">Password:</label>
                <input type="password" name="password" style="width: 100%; font-size: x-small; border: 1px solid #7F9DB9; padding: 2px;">
            </div>
            
            <div>
                <input type="submit" value="Sign in" style="font-size: x-small; font-weight: bold; background-color: #e6e6e6; border: 1px solid #7f7f7f; padding: 2px 6px; cursor: pointer;">
            </div>
        </form>
        
        <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; font-size: x-small;">
            <a href="/reset-password" style="color: #0033cc; text-decoration: none;">Reset password</a>
            <p style="margin: 10px 0 0 0;">If you aren't a Roblox member:</p>
            <a href="/register" style="color: #0033cc; text-decoration: none; font-weight: bold;">Create an Account</a>
        </div>
    </div>

</div>
</div>
</div>
</body>
</html>
